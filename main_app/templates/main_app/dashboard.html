<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Cá Nhân - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container" style="max-width: 500px;">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-4">
                <h3 class="mb-0 fw-bold tracking-wide">BẢNG ĐIỀU KHIỂN</h3>
                <small class="text-white-50">Hệ thống xác thực người dùng</small>
            </div>

            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <span class="display-1 text-primary">
                        👤
                    </span>
                </div>

                <h4 class="card-title fw-normal mb-3">
                    Chào mừng quay trở lại,
                </h4>
                <h2 class="text-primary fw-bold mb-4">
                    {{ user.username }}
                </h2>

                <p class="text-muted small mb-4">
                    Bạn đã đăng nhập thành công vào trang quản trị bảo mật (Dashboard) của hệ thống.
                </p>

                <hr class="my-4 text-muted opacity-25">

                <div class="d-grid gap-2">
                    <a href="/books/" class="btn btn-outline-primary py-2 fw-semibold">
                        <i class="bi bi-book"></i> Đi tới Quản lý Sách
                    </a>
                    <a href="{% url 'logout' %}" class="btn btn-danger py-2 fw-semibold shadow-sm">
                        <i class="bi bi-box-arrow-right"></i> Đăng xuất khỏi hệ thống
                    </a>
                </div>
            </div>

            <div class="card-footer bg-white border-0 text-center pb-3 text-muted small">
                © 2026 Django Framework Exam Project
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
